version: 2
updates:
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "daily"
    allow:
      - dependency-name: "deps/openvic-dataloader"
      - dependency-name: "scripts"
      - dependency-name: "deps/lexy-vdf"
    labels:
      - dependencies
      - "deps:submodules"
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - dependencies
      - "deps:pre-commit"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - dependencies
      - "deps:github actions"
